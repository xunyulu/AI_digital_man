<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI智能导游 - 管理后台</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">AI智能导游</div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="dashboard" href="#">📊 数据大屏</a>
      <a class="nav-item" data-page="attractions" href="#">🏛️ 景点管理</a>
      <a class="nav-item" data-page="knowledge" href="#">📚 知识库管理</a>
      <a class="nav-item" data-page="routes" href="#">🗺️ 路线管理</a>
      <a class="nav-item" data-page="config" href="#">⚙️ 数字人配置</a>
      <a class="nav-item" data-page="reports" href="#">📋 游客报告</a>
    </nav>
    <div class="sidebar-footer">
      <span id="adminName">管理员</span>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <!-- Dashboard -->
    <section class="page active" id="page-dashboard">
      <h2>数据大屏</h2>
      <div class="stat-grid" id="statGrid">
        <div class="stat-card"><div class="stat-num" id="statConversations">-</div><div class="stat-label">总对话数</div></div>
        <div class="stat-card"><div class="stat-num" id="statActive">-</div><div class="stat-label">活跃对话</div></div>
        <div class="stat-card"><div class="stat-num" id="statTourists">-</div><div class="stat-label">游客数</div></div>
        <div class="stat-card"><div class="stat-num" id="statAvgScore">-</div><div class="stat-label">平均评分</div></div>
        <div class="stat-card"><div class="stat-num" id="statSpots">-</div><div class="stat-label">景区数</div></div>
        <div class="stat-card"><div class="stat-num" id="statRatings">-</div><div class="stat-label">评价总数</div></div>
      </div>
      <div class="chart-row">
        <div class="chart-box"><h3>评分分布</h3><canvas id="chartRating" width="300" height="200"></canvas></div>
      </div>
    </section>

    <!-- Attractions -->
    <section class="page" id="page-attractions">
      <h2>景点管理</h2>
      <div class="toolbar">
        <select id="attrScenicFilter"><option value="1">灵山胜境</option></select>
        <button class="btn-primary" onclick="showAttrForm()">+ 新增景点</button>
      </div>
      <table class="data-table"><thead><tr>
        <th>ID</th><th>名称</th><th>排序</th><th>坐标</th><th>操作</th>
      </tr></thead><tbody id="attrTableBody"></tbody></table>
      <!-- Attraction Form Modal -->
      <div class="modal" id="attrModal">
        <div class="modal-content">
          <h3 id="attrModalTitle">新增景点</h3>
          <form id="attrForm">
            <input type="hidden" id="attrId">
            <div class="form-group"><label>名称</label><input id="attrName" required></div>
            <div class="form-group"><label>描述</label><textarea id="attrDesc" rows="3"></textarea></div>
            <div class="form-row">
              <div class="form-group"><label>纬度</label><input id="attrLat" type="number" step="0.0001"></div>
              <div class="form-group"><label>经度</label><input id="attrLng" type="number" step="0.0001"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>排序</label><input id="attrSort" type="number" value="99"></div>
              <div class="form-group"><label>开放时间</label><input id="attrOpenTime"></div>
            </div>
            <div class="form-actions">
              <button type="button" class="btn-cancel" onclick="closeAttrModal()">取消</button>
              <button type="submit" class="btn-primary">保存</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!-- Knowledge Points -->
    <section class="page" id="page-knowledge">
      <h2>知识库管理</h2>
      <div class="toolbar">
        <button class="btn-primary" onclick="showKpForm()">+ 新增知识点</button>
      </div>
      <table class="data-table"><thead><tr>
        <th>ID</th><th>标题</th><th>分类</th><th>关联景点</th><th>操作</th>
      </tr></thead><tbody id="kpTableBody"></tbody></table>
      <!-- KP Form Modal -->
      <div class="modal" id="kpModal">
        <div class="modal-content">
          <h3 id="kpModalTitle">新增知识点</h3>
          <form id="kpForm">
            <input type="hidden" id="kpId">
            <div class="form-group"><label>标题</label><input id="kpTitle" required></div>
            <div class="form-group"><label>内容</label><textarea id="kpContent" rows="4"></textarea></div>
            <div class="form-row">
              <div class="form-group"><label>分类</label><input id="kpCategory"></div>
              <div class="form-group"><label>标签</label><input id="kpTags"></div>
            </div>
            <div class="form-group"><label>关联景点</label><select id="kpAttraction"><option value="">无(景区通用)</option></select></div>
            <div class="form-actions">
              <button type="button" class="btn-cancel" onclick="closeKpModal()">取消</button>
              <button type="submit" class="btn-primary">保存</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!-- Routes -->
    <section class="page" id="page-routes">
      <h2>路线管理</h2>
      <div class="toolbar">
        <button class="btn-primary" onclick="showRouteForm()">+ 新增路线</button>
      </div>
      <table class="data-table"><thead><tr>
        <th>ID</th><th>名称</th><th>主题</th><th>时长</th><th>景点数</th><th>操作</th>
      </tr></thead><tbody id="routeTableBody"></tbody></table>
    </section>

    <!-- Config -->
    <section class="page" id="page-config">
      <h2>数字人形象配置</h2>
      <form id="configForm" class="config-form">
        <div class="form-group"><label>导游名称</label><input id="cfgGuideName" placeholder="灵灵"></div>
        <div class="form-group"><label>欢迎语</label><textarea id="cfgWelcome" rows="2" placeholder="你好！我是灵灵，你的AI导游~"></textarea></div>
        <div class="form-group"><label>TTS语音音色</label>
          <select id="cfgVoice">
            <option value="longxiaochun">龙小春 (女声·温柔)</option>
            <option value="longxiaochun_v2">龙小春V2</option>
            <option value="longwan">龙婉 (女声·知性)</option>
            <option value="longanyang">龙安阳 (男声)</option>
          </select>
        </div>
        <div class="form-group"><label>语音速度</label>
          <input type="range" id="cfgSpeed" min="0.5" max="2" step="0.1" value="1">
          <span id="speedVal">1.0x</span>
        </div>
        <button type="submit" class="btn-primary">保存配置</button>
      </form>
    </section>

    <!-- Reports -->
    <section class="page" id="page-reports">
      <h2>游客感受度报告</h2>
      <button class="btn-primary" onclick="loadReports()">刷新数据</button>
      <div class="report-section" style="margin-top:16px">
        <h3>评分分布</h3>
        <div id="reportDist"></div>
        <h3 style="margin-top:16px">游客近期提问</h3>
        <ul id="reportQueries" style="list-style:disc;padding-left:20px"></ul>
      </div>
    </section>
  </main>
</div>

<script src="admin.js"></script>
</body>
</html>
