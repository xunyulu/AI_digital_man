<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 登录</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#2e8b57,#1a5632);min-height:100vh;display:flex;
  align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:40px 32px;width:360px;
  box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.login-box h1{text-align:center;color:#2e8b57;margin-bottom:8px;font-size:24px}
.login-box .sub{text-align:center;color:#888;margin-bottom:28px;font-size:13px}
.form-group{margin-bottom:18px}
.form-group label{display:block;margin-bottom:6px;color:#555;font-size:14px}
.form-group input{width:100%;height:42px;border:1px solid #ddd;border-radius:8px;
  padding:0 12px;font-size:15px;outline:none;transition:border-color 0.2s}
.form-group input:focus{border-color:#2e8b57}
.login-btn{width:100%;height:44px;background:#2e8b57;color:#fff;border:none;
  border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity 0.2s}
.login-btn:hover{opacity:0.9}
.error{color:#e74c3c;text-align:center;margin-top:12px;font-size:13px;display:none}
</style>
</head>
<body>
<div class="login-box">
  <h1>AI智能导游</h1>
  <div class="sub">管理后台登录</div>
  <div class="form-group">
    <label>用户名</label>
    <input type="text" id="username" placeholder="请输入用户名" autocomplete="off">
  </div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="password" placeholder="请输入密码">
  </div>
  <button class="login-btn" id="loginBtn">登 录</button>
  <div class="error" id="errorMsg"></div>
</div>
<script>
document.getElementById('loginBtn').addEventListener('click', async () => {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  if (!username || !password) return;
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const body = await res.json();
    if (body.code === 200) {
      localStorage.setItem('admin_token', body.data.token);
      localStorage.setItem('admin_user', body.data.username);
      location.href = 'index.html';
    } else {
      document.getElementById('errorMsg').textContent = body.message || '登录失败';
      document.getElementById('errorMsg').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('errorMsg').textContent = '网络错误';
    document.getElementById('errorMsg').style.display = 'block';
  }
});
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
</script>
</body>
</html>
